name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts
        env:
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X github.com/scottzirkel/hostr/cmd.Version=${VERSION} -X github.com/scottzirkel/hostr/cmd.Commit=${COMMIT} -X github.com/scottzirkel/hostr/cmd.BuildDate=${build_date}"

          mkdir -p dist
          for goarch in amd64 arm64; do
            name="hostr_${VERSION}_linux_${goarch}"
            mkdir -p "dist/${name}"
            GOOS=linux GOARCH="${goarch}" go build -trimpath -ldflags "${ldflags}" -o "dist/${name}/hostr" .
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            rm -rf "dist/${name}"
          done
          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz dist/checksums.txt \
            --title "hostr ${GITHUB_REF_NAME}" \
            --generate-notes
